<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Next Stage — Descubra jogos em alta e recomendados para você.">
<title>Next Stage</title>

<style>
  :root {
    --bg: #1b2838;
    --bg-header: #171a21;
    --bg-card: #2a475e;
    --bg-card-hover: #3b6a8a;
    --accent: #66c0f4;
    --text: #c7d5e0;
    --text-muted: #8f98a0;
    --green: #a4d007;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── Header ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: var(--bg-header);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .menu a {
    margin-left: 20px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .menu a:hover {
    color: var(--accent);
  }

  /* Menu hamburger (mobile) */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: 0.3s;
  }

  /* ── Container ── */
  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  .section-title {
    font-size: 20px;
    font-weight: bold;
    margin: 30px 0 12px;
    border-left: 4px solid var(--accent);
    padding-left: 10px;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--bg-card);
    border-radius: 8px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    background: var(--bg-card-hover);
  }

  .card-img-wrapper {
    position: relative;
    background: #1b2838;
    overflow: hidden;
    aspect-ratio: 460 / 215;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.3s;
  }

  .card img.loading {
    opacity: 0;
  }

  .card-content {
    padding: 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card h3 {
    margin: 0;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .price {
    color: var(--green);
    font-size: 13px;
    font-weight: bold;
    margin-top: 2px;
  }

  .btn {
    background: var(--accent);
    border: none;
    padding: 10px 12px;
    border-radius: 4px;
    cursor: pointer;
    width: 100%;
    margin-top: auto;
    padding-top: 10px;
    font-weight: bold;
    font-size: 13px;
    color: #0e1621;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover {
    background: #4fa8d8;
    transform: scale(1.02);
  }

  .btn:active {
    transform: scale(0.98);
  }

  /* ── Skeleton Loading ── */
  .skeleton-card {
    background: var(--bg-card);
    border-radius: 8px;
    overflow: hidden;
  }

  .skeleton-img {
    width: 100%;
    aspect-ratio: 460 / 215;
    background: #1e3448;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-line {
    height: 14px;
    border-radius: 4px;
    background: #1e3448;
    margin: 10px 12px 6px;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-line.short {
    width: 60%;
    height: 11px;
    margin-bottom: 12px;
  }

  @keyframes shimmer {
    0%   { opacity: 0.5; }
    50%  { opacity: 1;   }
    100% { opacity: 0.5; }
  }

  /* ── Mensagem de erro ── */
  .error-msg {
    color: #e06c6c;
    padding: 12px;
    background: rgba(224,108,108,0.1);
    border-radius: 6px;
    border: 1px solid rgba(224,108,108,0.3);
    font-size: 14px;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 28px 20px;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid #2a475e;
    margin-top: 40px;
  }

  footer a {
    color: var(--accent);
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }

  /* ── Responsivo ── */
  @media (max-width: 600px) {
    header {
      padding: 12px 20px;
    }

    .menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 54px;
      left: 0;
      width: 100%;
      background: var(--bg-header);
      padding: 10px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .menu.open {
      display: flex;
    }

    .menu a {
      margin: 0;
      padding: 12px 24px;
      border-bottom: 1px solid #2a3a4a;
      font-size: 15px;
    }

    .hamburger {
      display: flex;
    }

    .grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .container {
      padding: 12px;
    }
  }
</style>
</head>

<body>

<header>
  <div class="logo">🎮 Next Stage</div>
  <nav class="menu" id="mainMenu">
    <a href="#">Loja</a>
    <a href="#">Tendências</a>
    <a href="#">Recomendações</a>
  </nav>
  <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="container">

  <div class="section-title">🔥 Em alta agora</div>
  <div id="trending" class="grid"></div>

  <div class="section-title">🎯 Recomendado para você</div>
  <div id="recommended" class="grid"></div>

</div>

<footer>
  © 2026 Next Stage &nbsp;·&nbsp; Dados via <a href="https://steamspy.com" target="_blank" rel="noopener">SteamSpy</a>
</footer>

<script>

  // ── Menu hamburger ──
  const hamburger = document.getElementById("hamburger");
  const mainMenu  = document.getElementById("mainMenu");

  hamburger.addEventListener("click", () => {
    const open = mainMenu.classList.toggle("open");
    hamburger.setAttribute("aria-expanded", open);
  });

  // ── Skeleton helpers ──
  function skeletonCards(n = 8) {
    return Array.from({ length: n }, () => `
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>
    `).join("");
  }

  // ── Imagem com lazy-load e fallback ──
  function imgTag(src, alt) {
    return `<img
      src="${src}"
      alt="${alt}"
      loading="lazy"
      class="loading"
      onerror="this.src='https://via.placeholder.com/460x215/2a475e/66c0f4?text=No+Image'"
      onload="this.classList.remove('loading')"
    >`;
  }

  // ── 🔥 Trending ──
  async function carregarTrending() {
    document.getElementById("trending").innerHTML = skeletonCards(8);

    try {
      const res = await fetch(
        "https://api.allorigins.win/raw?url=" +
        encodeURIComponent("https://steamspy.com/api.php?request=top100in2weeks")
      );

      if (!res.ok) throw new Error("Resposta inválida da API");

      const data = await res.json();
      const jogos = Object.values(data).slice(0, 8);

      const html = jogos.map(jogo => `
        <div class="card">
          <div class="card-img-wrapper">
            ${imgTag(
              `https://cdn.cloudflare.steamstatic.com/steam/apps/${jogo.appid}/header.jpg`,
              jogo.name
            )}
          </div>
          <div class="card-content">
            <h3 title="${jogo.name}">${jogo.name}</h3>
            <div class="meta">🔥 Popular agora</div>
            <div class="price">Ver na Steam →</div>
            <button class="btn" onclick="abrirSteam(${jogo.appid})">Abrir na Steam</button>
          </div>
        </div>
      `).join("");

      document.getElementById("trending").innerHTML = html;

    } catch (e) {
      document.getElementById("trending").innerHTML =
        `<div class="error-msg">⚠️ Não foi possível carregar os jogos em alta. Tente novamente mais tarde.</div>`;
      console.error("carregarTrending:", e);
    }
  }

  // ── 🔗 Abrir Steam ──
  function abrirSteam(appid) {
    window.open(`https://store.steampowered.com/app/${appid}`, "_blank", "noopener");
  }

  // ── 🎯 Recomendados ──
  const recomendados = [
    { nome: "Hades",              appid: 1145360,  tag: "Roguelike"        },
    { nome: "Cyberpunk 2077",     appid: 1091500,  tag: "RPG / Mundo aberto" },
    { nome: "Hollow Knight",      appid: 367520,   tag: "Metroidvania"     },
    { nome: "Deep Rock Galactic", appid: 548430,   tag: "Co-op / Shooter"  },
    { nome: "Stardew Valley",     appid: 413150,   tag: "Simulação"        },
    { nome: "Red Dead Redemption 2", appid: 1174180, tag: "Ação / Mundo aberto" },
  ];

  function renderRecomendados() {
    const html = recomendados.map(jogo => `
      <div class="card">
        <div class="card-img-wrapper">
          ${imgTag(
            `https://cdn.cloudflare.steamstatic.com/steam/apps/${jogo.appid}/header.jpg`,
            jogo.nome
          )}
        </div>
        <div class="card-content">
          <h3 title="${jogo.nome}">${jogo.nome}</h3>
          <div class="meta">🎯 ${jogo.tag}</div>
          <button class="btn" onclick="abrirSteam(${jogo.appid})">Jogar na Steam</button>
        </div>
      </div>
    `).join("");

    document.getElementById("recommended").innerHTML = html;
  }

  carregarTrending();
  renderRecomendados();

</script>

</body>
</html>
